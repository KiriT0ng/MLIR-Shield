<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-label="MLIR Shield">
  <defs>
    <linearGradient id="cyanBody" x1="0.18" y1="0.08" x2="0.86" y2="0.92">
      <stop offset="0%" stop-color="#2AD9FF"/>
      <stop offset="40%" stop-color="#17C7F0"/>
      <stop offset="78%" stop-color="#0FAFDC"/>
      <stop offset="100%" stop-color="#089CCB"/>
    </linearGradient>
    <linearGradient id="navyBody" x1="0.14" y1="0.08" x2="0.90" y2="0.92">
      <stop offset="0%" stop-color="#123E85"/>
      <stop offset="34%" stop-color="#0D3374"/>
      <stop offset="76%" stop-color="#082863"/>
      <stop offset="100%" stop-color="#061E52"/>
    </linearGradient>
    <linearGradient id="cyanWord" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09B8E7"/>
      <stop offset="28%" stop-color="#10D5FB"/>
      <stop offset="61%" stop-color="#00A8DA"/>
      <stop offset="100%" stop-color="#008FC8"/>
    </linearGradient>
    <linearGradient id="wordNavy" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%" stop-color="#0B336D"/>
      <stop offset="25%" stop-color="#051E4D"/>
      <stop offset="68%" stop-color="#082E65"/>
      <stop offset="100%" stop-color="#031A42"/>
    </linearGradient>
    <!-- Mirror-paired top highlights: both begin brighter at the outer shoulder
         and fade toward the central opening. -->
    <linearGradient id="topGlossLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.34"/>
      <stop offset="58%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="85%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topGlossRight" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.34"/>
      <stop offset="58%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="85%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-22%" width="150%" height="155%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="7" result="offsetblur"/>
      <feColorMatrix in="offsetblur" type="matrix"
        values="0 0 0 0 0.015
                0 0 0 0 0.06
                0 0 0 0 0.16
                0 0 0 0.18 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tinyShadow" x="-15%" y="-20%" width="130%" height="145%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.1"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feColorMatrix in="offsetblur" type="matrix"
        values="0 0 0 0 0.015
                0 0 0 0 0.08
                0 0 0 0 0.18
                0 0 0 0.14 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softWordmarkOffsetBlur" x="-20%" y="-20%" width="150%" height="160%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <clipPath id="leftShieldClip">
      <path d="M298 354 L161 413 L161 538 C161 573 177 597 205 620 L308 680 L308 646 L222 596 C199 578 188 557 188 531 L188 431 L298 382 Z"/>
    </clipPath>
    <clipPath id="rightShieldClip">
      <path d="M319 354 L454 413 L454 538 C454 573 439 597 411 620 L308 680 L308 646 L394 596 C417 578 428 557 428 531 L428 431 L319 382 Z"/>
