         left: outer left → center; right: outer right → center. -->
    <g clip-path="url(#leftShieldClip)">
      <path d="M194 414 L279 377" fill="none" stroke="url(#topGlossLeft)" stroke-width="7.0" stroke-linecap="round" opacity="0.88"/>
      <path d="M199 416 L274 383" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1.9" stroke-linecap="round"/>
    </g>
    <g clip-path="url(#rightShieldClip)">
      <path d="M337 377 L422 414" fill="none" stroke="url(#topGlossRight)" stroke-width="7.0" stroke-linecap="round" opacity="0.88"/>
      <path d="M342 383 L417 416" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1.9" stroke-linecap="round"/>
    </g>
    <g clip-path="url(#mLeftClip)">
      <path d="M225 446 L296 486" fill="none" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g clip-path="url(#mRightClip)">
      <path d="M391 447 L320 486" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2.6" stroke-linecap="round"/>
    </g>
    <g clip-path="url(#mLowerLeftClip)">
      <path d="M248 487 L301 518" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2.6" stroke-linecap="round"/>
    </g>
    <g clip-path="url(#mLowerRightClip)">
      <path d="M368 487 L315 518" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2.4" stroke-linecap="round"/>
    </g>
  </g>

