    <clipPath id="mLowerRightClip">
      <path d="M378 479 L308 520 L308 548 L378 507 Z"/>
    </clipPath>
  </defs>

  <rect width="1448" height="1086" fill="#FFFFFF"/>


  <g id="icon" filter="url(#shadow)" transform="translate(1.132,-9.800) scale(1.024000,1.034000)">
    <path id="shield_left"
