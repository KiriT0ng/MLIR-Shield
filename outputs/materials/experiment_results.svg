<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 38px Arial, 'Microsoft YaHei', sans-serif; fill: #172033; }
      .subtitle { font: 18px Arial, 'Microsoft YaHei', sans-serif; fill: #5b6678; }
      .label { font: 700 17px Arial, 'Microsoft YaHei', sans-serif; fill: #172033; }
      .small { font: 14px Arial, 'Microsoft YaHei', sans-serif; fill: #64748b; }
      .axis { stroke: #cbd5e1; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #d8e0ea; stroke-width: 2; rx: 8; }
      .runs { fill: #0f766e; }
      .issues { fill: #b42318; }
      .clusters { fill: #475569; }
      .metric { font: 700 30px Arial, 'Microsoft YaHei', sans-serif; fill: #172033; }
      .metric-label { font: 14px Arial, 'Microsoft YaHei', sans-serif; fill: #64748b; }
      .table-head { font: 700 15px Arial, 'Microsoft YaHei', sans-serif; fill: #334155; }
      .table-cell { font: 15px Arial, 'Microsoft YaHei', sans-serif; fill: #334155; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="900"/>
  <text x="72" y="72" class="title">实验结果总览</text>
  <text x="72" y="108" class="subtitle">当前证据覆盖 130 个 MLIR seed，重点展示真实 issue 复现、基线稳定性和失败聚类能力</text>

  <rect x="72" y="145" width="610" height="585" class="card"/>
  <text x="105" y="188" class="label">Runs / Issues / Failure Clusters</text>
  <line x1="125" y1="660" x2="620" y2="660" class="axis"/>
  <g transform="translate(420 176)">
    <rect x="0" y="0" width="16" height="16" class="runs"/><text x="24" y="14" class="small">Runs</text>
    <rect x="85" y="0" width="16" height="16" class="issues"/><text x="109" y="14" class="small">Issues</text>
    <rect x="185" y="0" width="16" height="16" class="clusters"/><text x="209" y="14" class="small">Clusters</text>
  </g>
  <g>
    <text x="125" y="209" class="label">Demo</text>
    <rect x="125" y="235" width="341" height="24" class="runs" rx="4"/>
    <text x="476" y="253" class="small">910 runs</text>
    <rect x="125" y="273" width="94" height="20" class="issues" rx="4"/>
    <text x="229" y="289" class="small">5 issues</text>
    <rect x="125" y="305" width="106" height="20" class="clusters" rx="4"/>
    <text x="241" y="321" class="small">5 clusters</text>
  </g><g>
    <text x="125" y="359" class="label">Mock Baseline</text>
    <rect x="125" y="385" width="390" height="24" class="runs" rx="4"/>
    <text x="525" y="403" class="small">1040 runs</text>
    <rect x="125" y="423" width="0" height="20" class="issues" rx="4"/>
    <text x="135" y="439" class="small">0 issues</text>
    <rect x="125" y="455" width="0" height="20" class="clusters" rx="4"/>
    <text x="135" y="471" class="small">0 clusters</text>
  </g><g>
    <text x="125" y="509" class="label">Issue Repros</text>
    <rect x="125" y="535" width="33" height="24" class="runs" rx="4"/>
    <text x="168" y="553" class="small">90 runs</text>
    <rect x="125" y="573" width="170" height="20" class="issues" rx="4"/>
    <text x="305" y="589" class="small">9 issues</text>
    <rect x="125" y="605" width="170" height="20" class="clusters" rx="4"/>
    <text x="305" y="621" class="small">8 clusters</text>
  </g>

  <rect x="735" y="145" width="633" height="585" class="card"/>
  <text x="770" y="188" class="label">Report Table</text>
  <text x="830" y="235" class="table-head">Report</text>
  <text x="1030" y="235" class="table-head">Seeds</text>
  <text x="1110" y="235" class="table-head">Runs</text>
  <text x="1190" y="235" class="table-head">Issues</text>
  <text x="1280" y="235" class="table-head">Clusters</text>
  <line x1="790" y1="255" x2="1328" y2="255" class="axis"/>
  <g>
    <text x="830" y="283" class="table-cell">Demo</text>
    <text x="1040" y="283" class="table-cell">130</text>
    <text x="1120" y="283" class="table-cell">910</text>
    <text x="1210" y="283" class="table-cell">5</text>
    <text x="1310" y="283" class="table-cell">5</text>
    <line x1="790" y1="305" x2="1328" y2="305" class="axis"/>
  </g><g>
    <text x="830" y="433" class="table-cell">Mock Baseline</text>
    <text x="1040" y="433" class="table-cell">130</text>
    <text x="1120" y="433" class="table-cell">1040</text>
    <text x="1210" y="433" class="table-cell">0</text>
    <text x="1310" y="433" class="table-cell">0</text>
    <line x1="790" y1="455" x2="1328" y2="455" class="axis"/>
  </g><g>
    <text x="830" y="583" class="table-cell">Issue Repros</text>
    <text x="1040" y="583" class="table-cell">9</text>
    <text x="1120" y="583" class="table-cell">90</text>
    <text x="1210" y="583" class="table-cell">9</text>
    <text x="1310" y="583" class="table-cell">8</text>
    <line x1="790" y1="605" x2="1328" y2="605" class="axis"/>
  </g>

  <rect x="72" y="770" width="1296" height="82" class="card"/>
  <text x="105" y="805" class="label">结论</text>
  <text x="105" y="835" class="small">Mock Baseline 验证框架链路稳定，Issue Repros 展示 8 个真实问题和 4 个失败簇，支持从统计总览下钻到案例复现。</text>
</svg>
